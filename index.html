<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDC ILMI SDS & COSHH Assessment Library</title>
  <script src="data.js"></script>

  <style>
    :root {
      --red: #c81919;
      --dark-red: #8f1111;
      --green: #087d6f;
      --dark-blue: #06204a;
      --amber: #d86812;
      --purple: #7c2bd6;
      --bg: #eef4fb;
      --card: #ffffff;
      --border: #d7e0ee;
      --text: #0a2248;
      --muted: #627086;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(238,244,251,.92), rgba(238,244,251,.96)),
        url("https://images.unsplash.com/photo-1581092918056-0c4c3acd3789?auto=format&fit=crop&w=1600&q=80");
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: var(--text);
    }

    header {
      background: linear-gradient(90deg, var(--dark-red), var(--red));
      color: white;
      padding: 30px 16px 28px;
      text-align: center;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: .2px;
    }

    header p {
      margin: 8px 0 0;
      font-size: 14px;
      opacity: .95;
    }

    .top-panel {
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 3px 14px rgba(15,35,70,.08);
    }

    .legend-wrap {
      padding: 14px 12px;
      overflow-x: auto;
      white-space: nowrap;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 10px;
      font-size: 13px;
      color: #333;
      font-weight: 600;
    }

    .legend-item img,
    .ghs-icon {
      width: 34px;
      height: 34px;
      object-fit: contain;
      vertical-align: middle;
    }

    .toolbar {
      padding: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .search,
    .filter {
      padding: 12px 14px;
      border: 1px solid #c7d2e1;
      border-radius: 8px;
      font-size: 15px;
      background: white;
      color: var(--text);
    }

    .search {
      width: min(520px, 96%);
    }

    .filter {
      min-width: 180px;
    }

    .btn-small {
      padding: 11px 16px;
      border: 1px solid #b9c9df;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      color: var(--dark-blue);
      font-weight: 700;
    }

    .btn-small:hover {
      background: #edf4ff;
    }

    .stats {
      max-width: 1500px;
      margin: 18px auto 0;
      padding: 0 18px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: rgba(255,255,255,.96);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 3px 12px rgba(15,35,70,.08);
      text-align: center;
    }

    .stat-card b {
      display: block;
      font-size: 25px;
      color: var(--red);
      margin-bottom: 4px;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    main {
      padding: 18px;
      max-width: 1500px;
      margin: auto;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(15,35,70,.10);
      overflow: hidden;
      border-top: 5px solid var(--green);
      transition: all .25s ease;
    }

    .card.high {
      border-top-color: var(--red);
    }

    .card.medium {
      border-top-color: var(--amber);
    }

    .card.health {
      border-top-color: var(--purple);
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(15,35,70,.16);
    }

    .card-summary {
      min-height: 145px;
      padding: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .card-summary:hover {
      background: #f8fbff;
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.3;
      color: var(--dark-blue);
    }

    .icons {
      min-height: 38px;
      margin: 8px 0 10px;
    }

    .expand-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px 12px;
      border: 1px solid #b9c9df;
      border-radius: 8px;
      background: white;
      color: var(--dark-blue);
      font-weight: 800;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      display: block;
      font-size: 14px;
    }

    .expand-btn:hover {
      background: #edf4ff;
    }

    .card-details {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid #e3e9f3;
      animation: openCard .25s ease;
    }

    .card.open .card-details {
      display: block;
    }

    @keyframes openCard {
      from {
        opacity: 0;
        transform: translateY(-6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }

    .meta div {
      background: #f6f9fe;
      border: 1px solid #e2e8f3;
      padding: 8px;
      border-radius: 8px;
      font-size: 13px;
      word-break: break-word;
    }

    .meta b {
      display: block;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .doc-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .link-btn {
      display: block;
      text-align: center;
      padding: 11px 12px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      font-weight: 800;
      font-size: 14px;
    }

    .sds-btn {
      background: var(--red);
    }

    .coshh-btn {
      background: var(--green);
    }

    .link-btn:hover {
      opacity: .88;
    }

    .link-btn.disabled {
      color: #8792a3;
      background: #f3f5f8;
      border: 1px solid #d8dee8;
      cursor: not-allowed;
      pointer-events: none;
    }

    .detail {
      max-width: 850px;
      margin: 20px auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 5px 20px rgba(15,35,70,.16);
      padding: 24px;
    }

    .detail h2 {
      margin: 0 0 12px;
      font-size: 25px;
      color: var(--dark-blue);
    }

    .detail .icons {
      margin: 14px 0 18px;
    }

    .back {
      display: inline-block;
      margin-bottom: 14px;
      color: var(--red);
      text-decoration: none;
      font-weight: 800;
    }

    .notice {
      background: #fff7e6;
      border: 1px solid #ffd38a;
      color: #704600;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 14px;
      line-height: 1.45;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px;
      background: rgba(255,255,255,.9);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    footer {
      text-align: center;
      color: var(--muted);
      padding: 22px;
      font-size: 12px;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 22px;
      }

      .meta,
      .doc-actions {
        grid-template-columns: 1fr;
      }

      .card-summary {
        min-height: 135px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>DDC ILMI SDS &amp; COSHH Assessment Library</h1>
    <p>Scan QR code or search to access chemical SDS and COSHH assessment documents</p>
  </header>

  <div class="top-panel">
    <div class="legend-wrap" id="legend"></div>

    <div class="toolbar" id="toolbar">
      <input class="search" id="searchBox" placeholder="Search chemicals, manufacturer, hazard, batch..." />

      <select class="filter" id="hazardFilter">
        <option value="">All hazards</option>
      </select>

      <select class="filter" id="manufacturerFilter">
        <option value="">All manufacturers</option>
      </select>

      <button class="btn-small" onclick="clearSearch()">Clear</button>
    </div>
  </div>

  <section class="stats" id="stats"></section>

  <main id="app"></main>

  <footer>
    HSE Department · DaiDung Steel &amp; Construction · ILMI Project
  </footer>

  <script>
    function esc(value) {
      return String(value ?? "").replace(/[&<>"']/g, s => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[s]));
    }

    function iconHtml(hazard) {
      return `<img class="ghs-icon" src="assets/${esc(hazard.icon)}" alt="${esc(hazard.label)}" title="${esc(hazard.key)}">`;
    }

    function hazardText(item) {
      return item.hazards && item.hazards.length
        ? item.hazards.map(h => h.key || h.label).join(", ")
        : "No GHS pictogram marked in inventory";
    }

    function cardLevel(item) {
      const keys = (item.hazards || []).map(h => h.key);
      if (keys.includes("FLAMMABLE") || keys.includes("ACUTE TOXICITY") || keys.includes("CORROSIVE")) return "high";
      if (keys.includes("SERIOUS HEALTH HAZARD") || keys.includes("HEALTH HAZARD")) return "health";
      if (keys.includes("HAZARDOUS TO ENVIRONMENT")) return "medium";
      return "";
    }

    function getSdsLink(item) {
      return item.sdsLink || item.sds || item.sdsUrl || "";
    }

    function getCoshhLink(item) {
      return item.coshhLink || item.coshh || item.coshhUrl || "";
    }

    function sdsButton(item) {
      const link = getSdsLink(item);
      if (!link) {
        return `<a class="link-btn disabled">SDS Not Linked</a>`;
      }
      return `<a class="link-btn sds-btn" href="${esc(link)}" target="_blank" rel="noopener">📄 SDS</a>`;
    }

    function coshhButton(item) {
      const link = getCoshhLink(item);
      if (!link) {
        return `<a class="link-btn disabled">COSHH Not Linked</a>`;
      }
      return `<a class="link-btn coshh-btn" href="${esc(link)}" target="_blank" rel="noopener">🛡️ COSHH</a>`;
    }

    function renderLegend() {
      const legend = document.getElementById("legend");

      if (typeof ghsLegend === "undefined" || !Array.isArray(ghsLegend)) {
        legend.innerHTML = "";
        return;
      }

      legend.innerHTML = ghsLegend.map(h => `
        <span class="legend-item">
          <img src="assets/${esc(h.icon)}" alt="${esc(h.label)}">
          ${esc(h.label)}
        </span>
      `).join("");
    }

    function toggleCard(id) {
      const card = document.getElementById("card-" + id);
      const btn = document.getElementById("btn-" + id);

      if (!card || !btn) return;

      card.classList.toggle("open");

      if (card.classList.contains("open")) {
        btn.innerHTML = "Hide Details ▲";
      } else {
        btn.innerHTML = "View Chemical Details ▼";
      }
    }

    function renderStats(list) {
      const total = chemicals.length;
      const showing = list.length;
      const withSds = chemicals.filter(c => getSdsLink(c)).length;
      const withCoshh = chemicals.filter(c => getCoshhLink(c)).length;

      document.getElementById("stats").innerHTML = `
        <div class="stat-card"><b>${esc(total)}</b><span>Total chemicals</span></div>
        <div class="stat-card"><b>${esc(showing)}</b><span>Currently showing</span></div>
        <div class="stat-card"><b>${esc(withSds)}</b><span>SDS linked</span></div>
        <div class="stat-card"><b>${esc(withCoshh)}</b><span>COSHH linked</span></div>
      `;
    }

    function renderGrid(list) {
      const app = document.getElementById("app");

      renderStats(list);

      if (!list.length) {
        app.innerHTML = `<div class="empty">No chemical found.</div>`;
        return;
      }

      app.innerHTML = `<div class="grid">` + list.map(item => `
        <div class="card ${cardLevel(item)}" id="card-${esc(item.id)}">

          <div class="card-summary" onclick="toggleCard('${esc(item.id)}')">
            <div>
              <h2>${esc(item.id)}. ${esc(item.name)}</h2>
              <div class="icons">${(item.hazards || []).map(iconHtml).join("")}</div>
            </div>

            <button class="expand-btn" id="btn-${esc(item.id)}" type="button">
              View Chemical Details ▼
            </button>
          </div>

          <div class="card-details">
            <div class="meta">
              <div><b>Manufacturer</b>${esc(item.manufacturer || "-")}</div>
              <div><b>Qty Stored</b>${esc(item.qtyStored || "-")}</div>
              <div><b>Flash Point</b>${esc(item.flashPoint || "-")}</div>
              <div><b>Expiry</b>${esc(item.expiryDate || "-")}</div>
              <div><b>Batch / Lot No.</b>${esc(item.batchNo || "-")}</div>
              <div><b>Inventory Row</b>${esc(item.excelRow || "-")}</div>
            </div>

            <a class="expand-btn" href="?id=${encodeURIComponent(item.id)}">
              Open Full Chemical Page
            </a>

            <div class="doc-actions">
              ${sdsButton(item)}
              ${coshhButton(item)}
            </div>
          </div>

        </div>
      `).join("") + `</div>`;
    }

    function renderDetail(item) {
      const app = document.getElementById("app");

      document.getElementById("toolbar").style.display = "none";
      document.getElementById("stats").style.display = "none";

      app.innerHTML = `
        <div class="detail">
          <a class="back" href="./">← Back to library</a>

          <h2>${esc(item.id)}. ${esc(item.name)}</h2>

          <div class="icons">${(item.hazards || []).map(iconHtml).join("")}</div>

          <div class="meta">
            <div><b>Hazards</b>${esc(hazardText(item))}</div>
            <div><b>Manufacturer / Trade Name</b>${esc(item.manufacturer || "-")}</div>
            <div><b>Flash Point</b>${esc(item.flashPoint || "-")}</div>
            <div><b>Batch / Lot No.</b>${esc(item.batchNo || "-")}</div>
            <div><b>HCS Expiry Date</b>${esc(item.expiryDate || "-")}</div>
            <div><b>Quantity Stored</b>${esc(item.qtyStored || "-")}</div>
            <div><b>MSDS Status</b>${esc(item.msdsStatus || "-")}</div>
            <div><b>COSHH Status</b>${esc(item.coshhStatus || "-")}</div>
            <div><b>Briefing Record</b>${esc(item.briefingRecord || "-")}</div>
            <div><b>Inventory Excel Row</b>${esc(item.excelRow || "-")}</div>
          </div>

          <div class="doc-actions">
            ${sdsButton(item)}
            ${coshhButton(item)}
          </div>

          <div class="notice">
            This page is for quick HSE reference only. Before using any chemical, follow the approved SDS, COSHH assessment, risk assessment, method statement, permit requirements, and site HSE instructions.
          </div>
        </div>
      `;
    }

    function populateFilters() {
      const hazardFilter = document.getElementById("hazardFilter");
      const manufacturerFilter = document.getElementById("manufacturerFilter");

      const hazardSet = new Set();
      const manufacturerSet = new Set();

      chemicals.forEach(item => {
        (item.hazards || []).forEach(h => {
          if (h.label) hazardSet.add(h.label);
        });

        if (item.manufacturer) {
          manufacturerSet.add(item.manufacturer);
        }
      });

      Array.from(hazardSet).sort().forEach(hazard => {
        hazardFilter.innerHTML += `<option value="${esc(hazard)}">${esc(hazard)}</option>`;
      });

      Array.from(manufacturerSet).sort().forEach(manufacturer => {
        manufacturerFilter.innerHTML += `<option value="${esc(manufacturer)}">${esc(manufacturer)}</option>`;
      });
    }

    function applyFilters() {
      const q = document.getElementById("searchBox").value.toLowerCase().trim();
      const hazard = document.getElementById("hazardFilter").value;
      const manufacturer = document.getElementById("manufacturerFilter").value;

      const filtered = chemicals.filter(item => {
        const text = [
          item.id,
          item.name,
          item.manufacturer,
          item.batchNo,
          item.flashPoint,
          item.expiryDate,
          item.qtyStored,
          item.msdsStatus,
          item.coshhStatus,
          hazardText(item)
        ].join(" ").toLowerCase();

        const matchSearch = !q || text.includes(q);
        const matchHazard = !hazard || (item.hazards || []).some(h => h.label === hazard);
        const matchManufacturer = !manufacturer || item.manufacturer === manufacturer;

        return matchSearch && matchHazard && matchManufacturer;
      });

      renderGrid(filtered);
    }

    function clearSearch() {
      document.getElementById("searchBox").value = "";
      document.getElementById("hazardFilter").value = "";
      document.getElementById("manufacturerFilter").value = "";
      renderGrid(chemicals);
      document.getElementById("searchBox").focus();
    }

    function start() {
      if (typeof chemicals === "undefined" || !Array.isArray(chemicals)) {
        document.getElementById("app").innerHTML = `
          <div class="empty">
            Chemical data not found. Please check that data.js is uploaded in the same folder as index.html.
          </div>
        `;
        return;
      }

      renderLegend();
      populateFilters();

      const params = new URLSearchParams(window.location.search);
      const id = Number(params.get("id"));

      if (id) {
        const item = chemicals.find(c => Number(c.id) === id);

        if (item) {
          renderDetail(item);
        } else {
          document.getElementById("app").innerHTML = `
            <div class="empty">Chemical ID not found. Please check the QR code.</div>
          `;
        }

        return;
      }

      renderGrid(chemicals);

      document.getElementById("searchBox").addEventListener("input", applyFilters);
      document.getElementById("hazardFilter").addEventListener("change", applyFilters);
      document.getElementById("manufacturerFilter").addEventListener("change", applyFilters);
    }

    start();
  </script>
</body>
</html>

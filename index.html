<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DDC ILMI SDS & COSHH Assessment Library</title>
  <script src="data.js"></script>
  <style>
    :root {
      --blue: #254f91;
      --dark-blue: #06204a;
      --green: #149b54;
      --red: #c8322b;
      --amber: #d86812;
      --purple: #8e44ad;
      --bg: #f2f6fb;
      --card: #ffffff;
      --border: #d7e0ee;
      --text: #0a2248;
      --muted: #627086;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: linear-gradient(90deg, #173f78, #2e5ba2);
      color: white;
      padding: 26px 16px 24px;
      text-align: center;
    }
    header h1 { margin: 0; font-size: 25px; letter-spacing: .2px; }
    header p { margin: 6px 0 0; font-size: 14px; opacity: .95; }
    .legend-wrap {
      background: #fff;
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      white-space: nowrap;
      text-align: center;
    }
    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin: 0 10px;
      font-size: 13px;
      color: #333;
    }
    .legend-item img, .ghs-icon {
      width: 34px;
      height: 34px;
      object-fit: contain;
      vertical-align: middle;
    }
    .toolbar {
      padding: 16px;
      background: #fff;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .search {
      width: min(520px, 96%);
      padding: 12px 14px;
      border: 1px solid #c7d2e1;
      border-radius: 8px;
      font-size: 15px;
    }
    .btn-small {
      padding: 11px 14px;
      border: 1px solid #b9c9df;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
      color: var(--blue);
      font-weight: 700;
    }
    main { padding: 18px; max-width: 1500px; margin: auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(245px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(15, 35, 70, .08);
      padding: 14px;
      min-height: 185px;
      position: relative;
      border-top: 5px solid var(--green);
    }
    .card.high { border-top-color: var(--red); }
    .card.medium { border-top-color: var(--amber); }
    .card.health { border-top-color: var(--purple); }
    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
      line-height: 1.25;
      color: var(--dark-blue);
    }
    .icons {
      min-height: 40px;
      margin: 8px 0 12px;
    }
    .link-btn {
      display: block;
      text-align: center;
      padding: 10px 12px;
      border: 1px solid #b9c9df;
      border-radius: 7px;
      color: var(--blue);
      background: #fff;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      margin-top: 8px;
    }
    .link-btn:hover { background: #edf4ff; }
    .link-btn.disabled {
      color: #8792a3;
      background: #f3f5f8;
      cursor: not-allowed;
      pointer-events: none;
    }
    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: 12px 0;
    }
    .meta div {
      background: #f6f9fe;
      border: 1px solid #e2e8f3;
      padding: 8px;
      border-radius: 7px;
      font-size: 13px;
    }
    .meta b { display: block; color: var(--muted); font-size: 11px; text-transform: uppercase; margin-bottom: 3px; }
    .detail {
      max-width: 760px;
      margin: 20px auto;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 3px 14px rgba(15, 35, 70, .12);
      padding: 22px;
    }
    .detail h2 {
      margin: 0 0 12px;
      font-size: 25px;
      color: var(--dark-blue);
    }
    .detail .icons { margin: 14px 0 18px; }
    .back { display: inline-block; margin-bottom: 14px; color: var(--blue); text-decoration: none; font-weight: 700; }
    .notice {
      background: #fff7e6;
      border: 1px solid #ffd38a;
      color: #704600;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      margin-top: 14px;
      line-height: 1.45;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px;
    }
    footer {
      text-align: center;
      color: var(--muted);
      padding: 18px;
      font-size: 12px;
    }
  </style>
</head>
<body>
<header>
  <h1>DDC ILMI SDS &amp; COSHH Assessment Library</h1>
  <p>Scan QR code or search to access chemical SDS &amp; COSHH assessment documents</p>
</header>

<div class="legend-wrap" id="legend"></div>

<div class="toolbar" id="toolbar">
  <input class="search" id="searchBox" placeholder="Search chemicals, manufacturer, hazard, batch..." />
  <button class="btn-small" onclick="clearSearch()">Clear</button>
</div>

<main id="app"></main>

<footer>
  HSE Department · DaiDung Steel &amp; Construction · ILMI Project
</footer>

<script>
  function esc(value) {
    return String(value ?? "").replace(/[&<>"']/g, s => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
    }[s]));
  }

  function iconHtml(hazard) {
    return `<img class="ghs-icon" src="assets/${esc(hazard.icon)}" alt="${esc(hazard.label)}" title="${esc(hazard.key)}">`;
  }

  function hazardText(item) {
    return item.hazards && item.hazards.length
      ? item.hazards.map(h => h.key).join(", ")
      : "No GHS pictogram marked in inventory";
  }

  function cardLevel(item) {
    const keys = item.hazards.map(h => h.key);
    if (keys.includes("FLAMMABLE") || keys.includes("ACUTE TOXICITY") || keys.includes("CORROSIVE")) return "high";
    if (keys.includes("SERIOUS HEALTH HAZARD") || keys.includes("HEALTH HAZARD")) return "health";
    if (keys.includes("HAZARDOUS TO ENVIRONMENT")) return "medium";
    return "";
  }

  function docButton(item) {
    if (!item.sdsCoshhLink) {
      return `<a class="link-btn disabled">SDS &amp; COSHH Assessment Not Linked</a>`;
    }
    return `<a class="link-btn" href="${esc(item.sdsCoshhLink)}" target="_blank" rel="noopener">📄 SDS &amp; COSHH Assessment</a>`;
  }

  function renderLegend() {
    document.getElementById("legend").innerHTML = ghsLegend.map(h => `
      <span class="legend-item"><img src="assets/${esc(h.icon)}" alt="${esc(h.label)}"> ${esc(h.label)}</span>
    `).join("");
  }

  function renderGrid(list) {
    const app = document.getElementById("app");
    if (!list.length) {
      app.innerHTML = `<div class="empty">No chemical found.</div>`;
      return;
    }
    app.innerHTML = `<div class="grid">` + list.map(item => `
      <div class="card ${cardLevel(item)}">
        <h2>${esc(item.id)}. ${esc(item.name)}</h2>
        <div class="icons">${item.hazards.map(iconHtml).join("")}</div>
        <div class="meta">
          <div><b>Manufacturer</b>${esc(item.manufacturer || "-")}</div>
          <div><b>Qty Stored</b>${esc(item.qtyStored || "-")}</div>
          <div><b>Flash Point</b>${esc(item.flashPoint || "-")}</div>
          <div><b>Expiry</b>${esc(item.expiryDate || "-")}</div>
        </div>
        <a class="link-btn" href="?id=${encodeURIComponent(item.id)}">View Chemical Details</a>
        ${docButton(item)}
      </div>
    `).join("") + `</div>`;
  }

  function renderDetail(item) {
    const app = document.getElementById("app");
    document.getElementById("toolbar").style.display = "none";
    app.innerHTML = `
      <div class="detail">
        <a class="back" href="./">← Back to library</a>
        <h2>${esc(item.id)}. ${esc(item.name)}</h2>
        <div class="icons">${item.hazards.map(iconHtml).join("")}</div>
        <div class="meta">
          <div><b>Hazards</b>${esc(hazardText(item))}</div>
          <div><b>Manufacturer / Trade Name</b>${esc(item.manufacturer || "-")}</div>
          <div><b>Flash Point</b>${esc(item.flashPoint || "-")}</div>
          <div><b>Batch / Lot No.</b>${esc(item.batchNo || "-")}</div>
          <div><b>HCS Expiry Date</b>${esc(item.expiryDate || "-")}</div>
          <div><b>Quantity Stored</b>${esc(item.qtyStored || "-")}</div>
          <div><b>MSDS Status</b>${esc(item.msdsStatus || "-")}</div>
          <div><b>COSHH Status</b>${esc(item.coshhStatus || "-")}</div>
          <div><b>Briefing Record</b>${esc(item.briefingRecord || "-")}</div>
          <div><b>Inventory Excel Row</b>${esc(item.excelRow || "-")}</div>
        </div>
        ${docButton(item)}
        <div class="notice">
          This page is for quick HSE reference only. Before using any chemical, follow the approved SDS, COSHH assessment, risk assessment, method statement, permit requirements, and site HSE instructions.
        </div>
      </div>
    `;
  }

  function clearSearch() {
    const box = document.getElementById("searchBox");
    box.value = "";
    renderGrid(chemicals);
    box.focus();
  }

  function start() {
    renderLegend();
    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get("id"));
    if (id) {
      const item = chemicals.find(c => Number(c.id) === id);
      if (item) renderDetail(item);
      else document.getElementById("app").innerHTML = `<div class="empty">Chemical ID not found. Please check the QR code.</div>`;
      return;
    }
    renderGrid(chemicals);
    document.getElementById("searchBox").addEventListener("input", e => {
      const q = e.target.value.toLowerCase().trim();
      const filtered = chemicals.filter(item => {
        const text = [
          item.name, item.manufacturer, item.batchNo, item.flashPoint,
          item.expiryDate, item.qtyStored, hazardText(item)
        ].join(" ").toLowerCase();
        return text.includes(q);
      });
      renderGrid(filtered);
    });
  }

  start();
</script>
</body>
</html>
